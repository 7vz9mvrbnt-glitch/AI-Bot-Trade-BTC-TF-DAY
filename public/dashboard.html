<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Daily Setup Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; padding: 24px; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    .sub { color: #8b949e; font-size: 0.85rem; margin-bottom: 16px; }
    .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
    select { background: #161b22; color: #e6edf3; border: 1px solid #30363d; border-radius: 6px; padding: 8px 12px; font-size: 0.9rem; cursor: pointer; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 24px; max-width: 480px; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-weight: 700; font-size: 0.9rem; margin-bottom: 16px; }
    .badge.UP { background: #0d4429; color: #3fb950; }
    .badge.DOWN { background: #4d1010; color: #f85149; }
    .badge.BUY { background: #0d4429; color: #3fb950; }
    .badge.SHORT { background: #4d1010; color: #f85149; }
    .badge.WAIT, .badge.WATCH_PULLBACK { background: #3d3300; color: #d29922; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
    .stat label { display: block; font-size: 0.75rem; color: #8b949e; margin-bottom: 2px; }
    .stat .val { font-size: 1.1rem; font-weight: 600; }
    .sep { border: none; border-top: 1px solid #30363d; margin: 16px 0; }
    .note { font-size: 0.78rem; color: #8b949e; margin-top: 16px; }
    .ai-comment { background: #0d1f0d; border: 1px solid #1f4a1f; border-radius: 8px; padding: 12px; margin-top: 16px; font-size: 0.8rem; color: #9ecfa4; line-height: 1.6; white-space: pre-line; }
    .ai-comment-title { font-size: 0.75rem; color: #3fb950; font-weight: 700; margin-bottom: 6px; }
    .error-msg { color: #f85149; margin-top: 16px; }
    .refresh-btn { padding: 8px 20px; background: #238636; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    .refresh-btn:hover { background: #2ea043; }
    .loading { color: #8b949e; font-size: 0.9rem; margin-top: 16px; }
    .price-big { font-size: 2rem; font-weight: 700; margin: 8px 0; }
  </style>
</head>
<body>
  <h1>📊 Crypto Daily Setup</h1>
  <p class="sub" id="generatedAt">กำลังโหลด...</p>

  <div class="controls">
    <select id="symbolSelect" onchange="loadSetup()">
      <optgroup label="── Crypto ──">
        <option value="BTCUSDT">BTC — Bitcoin</option>
        <option value="ETHUSDT">ETH — Ethereum</option>
        <option value="BNBUSDT">BNB — BNB</option>
        <option value="XRPUSDT">XRP — Ripple</option>
        <option value="SOLUSDT">SOL — Solana</option>
        <option value="PAXGUSDT">PAXG — PAX Gold</option>
      </optgroup>
      <optgroup label="── Magnificent 7 ──">
        <option value="AAPL">AAPL — Apple</option>
        <option value="MSFT">MSFT — Microsoft</option>
        <option value="NVDA">NVDA — Nvidia</option>
        <option value="GOOGL">GOOGL — Google</option>
        <option value="AMZN">AMZN — Amazon</option>
        <option value="META">META — Meta</option>
        <option value="TSLA">TSLA — Tesla</option>
      </optgroup>
      <optgroup label="── Index ──">
        <option value="^GSPC">S&amp;P 500</option>
        <option value="^NDX">NASDAQ 100</option>
      </optgroup>
    </select>
    <button class="refresh-btn" onclick="loadSetup()">🔄 รีเฟรช</button>
  </div>

  <div class="card" id="card">
    <p class="loading">⏳ กำลังดึงข้อมูลจาก Binance...</p>
  </div>

  <script>
    const BACKEND_URL = window.location.origin;

    async function loadSetup() {
      const symbol = document.getElementById("symbolSelect").value;
      const card = document.getElementById("card");
      const genAt = document.getElementById("generatedAt");
      card.innerHTML = '<p class="loading">⏳ กำลังดึงข้อมูล...</p>';

      try {
        const res = await fetch(`${BACKEND_URL}/api/btc?symbol=${symbol}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || "Unknown error");

        const s = data.setup;
        genAt.textContent = `${s.displayName || s.symbol} — อัปเดตเมื่อ: ${new Date(data.generatedAt).toLocaleString("th-TH")}`;

        const fmt = (n) => Number(n).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        card.innerHTML = `
          <span class="badge ${s.trend}">Trend: ${s.trend}</span>
          <span class="badge ${s.recommendation}" style="margin-left:8px">${s.recommendation}</span>
          <div class="price-big">$${fmt(s.price)}</div>
          <div class="grid">
            <div class="stat"><label>EMA 8</label><div class="val">$${fmt(s.ema8)}</div></div>
            <div class="stat"><label>EMA 21</label><div class="val">$${fmt(s.ema21)}</div></div>
          </div>
          <hr class="sep"/>
          <div class="grid">
            <div class="stat"><label>Entry Low</label><div class="val">$${fmt(s.entryLow)}</div></div>
            <div class="stat"><label>Entry High</label><div class="val">$${fmt(s.entryHigh)}</div></div>
            <div class="stat"><label>Stop Loss</label><div class="val">$${fmt(s.sl)} <small>(${s.stopPct}%)</small></div></div>
            <div class="stat"><label>Take Profit</label><div class="val">$${fmt(s.tp)} <small>(${s.tpPct}%)</small></div></div>
          </div>
          <p class="note">🔧 ${s.note}</p>
          ${s.aiComment ? `
          <div class="ai-comment">
            <div class="ai-comment-title">💬 คำแนะนำ AI</div>
            ${escHtml(s.aiComment)}
          </div>` : ''}
        `;
      } catch (err) {
        card.innerHTML = `<p class="error-msg">❌ ${err.message}</p>`;
        genAt.textContent = "โหลดไม่สำเร็จ";
      }
    }

    function escHtml(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    loadSetup();
  </script>
</body>
</html>
